name: Publish packages

on:
    workflow_dispatch:

# Publishing to GitHub Packages needs packages: write.
permissions:
    contents: read
    packages: write

jobs:
    publish-sdk:
        name: Publish @coshi190/junoswap-sdk
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.x

            - run: bun install --frozen-lockfile

            # Routes the @coshi190 scope to GitHub Packages and writes the auth line.
            # Produces ~/.npmrc:
            #   @coshi190:registry=https://npm.pkg.github.com
            #   //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  registry-url: https://npm.pkg.github.com
                  scope: '@coshi190'

            # prepublishOnly ("bun run build" -> tsc) builds dist against the committed
            # generated ABIs in packages/sdk/src/abis — no Foundry/codegen needed here.
            - run: npm publish
              working-directory: packages/sdk
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
